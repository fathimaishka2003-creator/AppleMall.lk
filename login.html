<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login / Register – AppleMall.lk</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .auth-section {
      min-height: 100vh;
      display: flex;
      align-items: center;
      padding: 100px 0 50px;
      background: radial-gradient(ellipse at 50% 50%, rgba(41,151,255,0.08) 0%, transparent 70%), #000;
    }
    .auth-card {
      background: #141414;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 40px;
      max-width: 480px;
      margin: 0 auto;
      width: 100%;
    }
    .auth-title {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: #f5f5f7;
      margin-bottom: 6px;
    }
    .auth-subtitle { color: #86868b; font-size: 0.95rem; margin-bottom: 28px; }
    .tab-btn {
      background: none;
      border: none;
      color: #86868b;
      font-size: 1rem;
      font-weight: 600;
      font-family: 'Outfit', sans-serif;
      padding: 8px 20px;
      border-radius: 100px;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .tab-btn.active {
      background: #2997ff;
      color: #fff;
    }
    .alert-success-custom {
      background: rgba(48,209,88,0.12);
      border: 1px solid rgba(48,209,88,0.3);
      color: #30d158;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 0.9rem;
    }
    .alert-error-custom {
      background: rgba(255,69,58,0.12);
      border: 1px solid rgba(255,69,58,0.3);
      color: #ff453a;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg fixed-top" id="mainNav">
    <div class="container">
      <a class="navbar-brand" href="index.html">
        <i class="fa-brands fa-apple"></i> AppleMall<span>.lk</span>
      </a>
      <div class="ms-auto">
        <a href="index.html" class="btn btn-outline-custom">Back to Home</a>
      </div>
    </div>
  </nav>

  <section class="auth-section">
    <div class="container">
      <div class="auth-card">

        <!-- Tabs -->
        <div class="d-flex gap-2 mb-4">
          <button class="tab-btn active" id="loginTab" onclick="showTab('login')">Login</button>
          <button class="tab-btn" id="registerTab" onclick="showTab('register')">Register</button>
        </div>

        <!-- Alert -->
        <div id="authAlert" class="mb-3 d-none"></div>

        <!-- LOGIN FORM -->
        <div id="loginForm">
          <h2 class="auth-title">Welcome Back</h2>
          <p class="auth-subtitle">Sign in to your AppleMall.lk account</p>
          <div class="mb-3">
            <label class="form-label text-white">Email Address *</label>
            <input type="email" class="form-control checkout-input" id="loginEmail" placeholder="you@example.com"/>
          </div>
          <div class="mb-3">
            <label class="form-label text-white">Password *</label>
            <input type="password" class="form-control checkout-input" id="loginPassword" placeholder="Your password"/>
          </div>
          <button class="btn btn-primary-custom w-100 mt-2" onclick="handleLogin()">
            Sign In <i class="fas fa-arrow-right ms-2"></i>
          </button>
          <p class="text-center mt-3" style="color:#86868b; font-size:0.9rem">
            Don't have an account? 
            <a href="#" onclick="showTab('register')" style="color:#2997ff">Register here</a>
          </p>
        </div>

        <!-- REGISTER FORM -->
        <div id="registerForm" class="d-none">
          <h2 class="auth-title">Create Account</h2>
          <p class="auth-subtitle">Join AppleMall.lk today</p>
          <div class="mb-3">
            <label class="form-label text-white">Full Name *</label>
            <input type="text" class="form-control checkout-input" id="regName" placeholder="Your full name"/>
          </div>
          <div class="mb-3">
            <label class="form-label text-white">Email Address *</label>
            <input type="email" class="form-control checkout-input" id="regEmail" placeholder="you@example.com"/>
          </div>
          <div class="mb-3">
            <label class="form-label text-white">Password *</label>
            <input type="password" class="form-control checkout-input" id="regPassword" placeholder="Min. 6 characters"/>
          </div>
          <div class="mb-3">
            <label class="form-label text-white">Phone Number</label>
            <input type="tel" class="form-control checkout-input" id="regPhone" placeholder="07X XXX XXXX"/>
          </div>
          <div class="mb-3">
            <label class="form-label text-white">Address</label>
            <textarea class="form-control checkout-input" id="regAddress" rows="2" placeholder="Your delivery address"></textarea>
          </div>
          <button class="btn btn-primary-custom w-100 mt-2" onclick="handleRegister()">
            Create Account <i class="fas fa-user-plus ms-2"></i>
          </button>
          <p class="text-center mt-3" style="color:#86868b; font-size:0.9rem">
            Already have an account? 
            <a href="#" onclick="showTab('login')" style="color:#2997ff">Login here</a>
          </p>
        </div>

      </div>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function showTab(tab) {
      document.getElementById('loginForm').classList.toggle('d-none', tab !== 'login');
      document.getElementById('registerForm').classList.toggle('d-none', tab !== 'register');
      document.getElementById('loginTab').classList.toggle('active', tab === 'login');
      document.getElementById('registerTab').classList.toggle('active', tab === 'register');
      document.getElementById('authAlert').classList.add('d-none');
    }

    function showAlert(message, type) {
      const alert = document.getElementById('authAlert');
      alert.className = type === 'success' ? 'alert-success-custom mb-3' : 'alert-error-custom mb-3';
      alert.innerHTML = `<i class="fas fa-${type === 'success' ? 'circle-check' : 'circle-xmark'} me-2"></i>${message}`;
    }

    async function handleLogin() {
      const email    = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;

      if (!email || !password) { showAlert('Please fill in all fields.', 'error'); return; }

      const formData = new FormData();
      formData.append('email', email);
      formData.append('password', password);

      try {
        const res  = await fetch('php/login.php', { method: 'POST', body: formData });
        const data = await res.json();
        if (data.success) {
          localStorage.setItem('applemall_user', JSON.stringify(data.user));
          showAlert(data.message, 'success');
          setTimeout(() => window.location.href = 'index.html', 1500);
        } else {
          showAlert(data.message, 'error');
        }
      } catch (e) {
        showAlert('Connection error. Make sure XAMPP is running.', 'error');
      }
    }

    async function handleRegister() {
      const name     = document.getElementById('regName').value.trim();
      const email    = document.getElementById('regEmail').value.trim();
      const password = document.getElementById('regPassword').value;
      const phone    = document.getElementById('regPhone').value.trim();
      const address  = document.getElementById('regAddress').value.trim();

      if (!name || !email || !password) { showAlert('Name, email and password are required.', 'error'); return; }
      if (password.length < 6) { showAlert('Password must be at least 6 characters.', 'error'); return; }

      const formData = new FormData();
      formData.append('full_name', name);
      formData.append('email', email);
      formData.append('password', password);
      formData.append('phone', phone);
      formData.append('address', address);

      try {
        const res  = await fetch('php/register.php', { method: 'POST', body: formData });
        const data = await res.json();
        if (data.success) {
          showAlert(data.message, 'success');
          setTimeout(() => showTab('login'), 2000);
        } else {
          showAlert(data.message, 'error');
        }
      } catch (e) {
        showAlert('Connection error. Make sure XAMPP is running.', 'error');
      }
    }
  </script>
</body>
</html>
